name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Block legacy discovery code
        run: bash scripts/check_legacy_discovery.sh

      - name: Verify discovery sources remain enabled
        run: bash scripts/check_discovery_sources.sh

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test*.py'
